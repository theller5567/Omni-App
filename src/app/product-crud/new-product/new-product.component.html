<div class="container">
  <h1>Product Catalogue
    <a [routerLink]="['/product-create']" class="btn btn-default btn-lg">
    <span class="glyphicon glyphicon-plus" aria-hidden="true"></span>
  </a>
  </h1>
  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>SKU</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.product_name }}</td>
        <td>{{ product.sku }}</td>
        <td (click)="showMe(product)">Show Detail</td>
      </tr>
    </tbody>
  </table>
</div>
