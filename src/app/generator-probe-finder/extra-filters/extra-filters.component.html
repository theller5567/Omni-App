<span class="toggle-filter" *ngIf="list?.length > 0 && selecterArray?.length > 1 && showFilter" (click)="toggleFilters($event)">Extra Filters <i [ngClass]="{ 'glyphicon-chevron-down': !showFilters, 'glyphicon-chevron-up': showFilters }" class="glyphicon"></i></span> 
<section *ngIf="showFilters && showFilter">
  <hr>
  <form *ngIf="list?.length > 0 && selecterArray?.length > 1" class="Filtered-inputs">
    <div *ngFor="let selecter of selecterArray" class="form-check form-check-inline">
      <label class="form-check-label">
        <input class="form-check-input" type="radio" name="filter-radio" (click)="onClick($event)" [checked]="isChecked" value="{{selecter}}"> {{selecter}}
      </label>
    </div>
    <div *ngIf="showWindowFn()" class="filter window-filter">
      <div class="close-btn"><i class="glyphicon glyphicon-remove" (click)="closeFilter()"></i></div>
      <div *ngFor="let window of windowList">
        <div class="form-check form-check-inline">
          <label class="form-check-label">
            <input class="form-check-input" type="radio" name="filter-radio" (click)="windowClick($event)" value="{{window}}"> {{window}}
          </label>
        </div>
      </div>
    </div>
    <div *ngIf="showTypeFn()" class="filter type-filter">
      <div class="close-btn"><i class="glyphicon glyphicon-remove" (click)="closeFilter()"></i></div>
      <div *ngFor="let type of typeList">
        <div class="form-check form-check-inline">
          <label class="form-check-label">
            <input class="form-check-input" type="radio" name="filter-radio" (click)="typeClick($event)" value="{{type}}"> {{type}}
          </label>
        </div>
      </div>
    </div>
    <div *ngIf="showLengthFn()" class="filter length-filter">
      <div class="close-btn"><i class="glyphicon glyphicon-remove" (click)="closeFilter()"></i></div>
      <div>
        <div class="form-group">
          <label for="Master-Products">Select Length</label>
          <select [ngModel]="lengthSelected" name="length" (ngModelChange)="lengthClick($event)" class="form-control" id="filter-length">
            <option *ngFor="let length of lengthList" [ngValue]="length">{{length}}</option>
          </select>
        </div>
      </div>
    </div>
  </form>
</section>
